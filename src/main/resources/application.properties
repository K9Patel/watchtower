spring.application.name=watchtower-backend

# ── Server ─────────────────────────────
server.port=8080

# ── Active Profile ─────────────────────
spring.profiles.active=simulator

# ── Database (PostgreSQL) ──────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/watchtower_db
spring.datasource.username=postgres
spring.datasource.password=Krisha@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ─────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Email (Gmail SMTP) ─────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=knpatel9965@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Scheduling ─────────────────────────
spring.task.scheduling.pool.size=3

# ── App Config ─────────────────────────
watchtower.alert.threshold=80
watchtower.admin.email=knpatel9965@gmail.com

# ── Logging ────────────────────────────
logging.level.com.watchtower=DEBUG

spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false